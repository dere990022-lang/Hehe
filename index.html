<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Adu Angka: Reel King 0</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        
        body { 
            background: #0d0d0d; 
            color: #fff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh;
            overflow: hidden;
        }

        .game-card {
            background: #1a1a1a;
            width: 90%;
            max-width: 400px;
            border-radius: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            border: 1px solid #333;
            padding-bottom: 20px;
        }

        .header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #2a2a2a;
        }

        .balance-label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .balance-val { font-size: 28px; font-weight: bold; color: #00ff88; text-shadow: 0 0 10px rgba(0,255,136,0.3); }

        /* SLOT REEL SYSTEM */
        .arena {
            display: grid;
            grid-template-columns: 1fr 40px 1fr;
            align-items: center;
            padding: 30px 15px;
        }

        .reel-container {
            background: #000;
            height: 100px;
            border-radius: 15px;
            border: 2px solid #333;
            overflow: hidden; /* Potong angka yang lewat */
            position: relative;
            box-shadow: inset 0 0 15px rgba(0,0,0,1);
        }

        .reel-strip {
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 3s cubic-bezier(0.1, 0, 0.1, 1); /* Efek ngerem perlahan */
        }

        .slot-num {
            height: 100px;
            min-height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 50px;
            font-weight: 900;
            color: #fff;
        }

        .vs-label { font-weight: 900; color: #444; font-style: italic; text-align: center; }

        /* Tombol & Input */
        .controls { padding: 0 20px; }
        
        input {
            width: 100%;
            padding: 15px;
            background: #252525;
            border: 1px solid #444;
            color: #ffd700;
            border-radius: 12px;
            font-size: 18px;
            text-align: center;
            margin-bottom: 15px;
        }

        #spin-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #ffd700, #b8860b);
            border: none;
            border-radius: 12px;
            color: #000;
            font-weight: 800;
            font-size: 18px;
            cursor: pointer;
            text-transform: uppercase;
        }

        #spin-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        #msg { text-align: center; margin: 15px 0; font-weight: bold; min-height: 20px; font-size: 14px; }

        /* King 0 Style */
        .is-zero { color: #ffd700 !important; text-shadow: 0 0 20px gold; }

        .footer-info { font-size: 10px; color: #444; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

<div class="game-card">
    <div class="header">
        <div class="balance-label">TOTAL CREDITS</div>
        <div id="balance" class="balance-val">1000</div>
    </div>

    <div class="arena">
        <div class="reel-container">
            <div id="p-strip" class="reel-strip">
                <div class="slot-num">?</div>
            </div>
        </div>
        
        <div class="vs-label">VS</div>

        <div class="reel-container">
            <div id="h-strip" class="reel-strip">
                <div class="slot-num">?</div>
            </div>
        </div>
    </div>

    <div id="msg">Tentukan bet dan GAS!</div>

    <div class="controls">
        <input type="number" id="bet-input" placeholder="JUMLAH BET">
        <button id="spin-btn" onclick="startSpin()">GAS TANDING!</button>
    </div>
    <div class="footer-info">0-30 | WIN: 45% | DRAW: HOST WIN | 0=KING(x3)</div>
</div>

<script>
    let points = parseInt(localStorage.getItem("saldo_reel")) || 1000;
    const pStrip = document.getElementById('p-strip');
    const hStrip = document.getElementById('h-strip');
    const msg = document.getElementById('msg');
    const spinBtn = document.getElementById('spin-btn');
    
    document.getElementById("balance").innerText = points;

    function buildReel(strip, finalNum) {
        strip.innerHTML = '';
        // Buat 30 angka acak buat efek putar
        for(let i=0; i<30; i++) {
            const div = document.createElement('div');
            div.className = 'slot-num';
            div.innerText = Math.floor(Math.random() * 31);
            strip.appendChild(div);
        }
        // Angka terakhir adalah hasil aslinya
        const finalDiv = document.createElement('div');
        finalDiv.className = 'slot-num' + (finalNum === 0 ? ' is-zero' : '');
        finalDiv.innerText = finalNum;
        strip.appendChild(finalDiv);
    }

    function startSpin() {
        const bet = parseInt(document.getElementById('bet-input').value);
        if (isNaN(bet) || bet <= 0) return alert("Isi bet dulu!");
        if (bet > points) return alert("Poin kurang!");

        points -= bet;
        updateUI();
        
        msg.innerText = "Berputar...";
        msg.style.color = "#888";
        spinBtn.disabled = true;

        // Tentukan hasil duluan (Probabilitas 45%)
        let pNum, hNum;
        const luck = Math.random();
        
        if (luck < 0.45) { // Player Win
            pNum = Math.floor(Math.random() * 31);
            hNum = (pNum === 0) ? (Math.floor(Math.random() * 30) + 1) : Math.floor(Math.random() * pNum);
        } else { // Host Win / Draw
            hNum = Math.floor(Math.random() * 31);
            pNum = (hNum === 0) ? Math.floor(Math.random() * 31) : Math.floor(Math.random() * (hNum + 1));
            if (pNum === 0 && hNum !== 0) pNum = 1; // Cegah p=0 kalo host bukan 0
        }

        // Siapkan Reel
        buildReel(pStrip, pNum);
        buildReel(hStrip, hNum);

        // Reset posisi strip
        pStrip.style.transition = 'none';
        hStrip.style.transition = 'none';
        pStrip.style.transform = 'translateY(0)';
        hStrip.style.transform = 'translateY(0)';

        // Jalankan animasi (pake timeout dikit biar transition: none tadi kepasang)
        setTimeout(() => {
            pStrip.style.transition = 'transform 3s cubic-bezier(0.1, 0, 0.1, 1)';
            hStrip.style.transition = 'transform 3s cubic-bezier(0.1, 0, 0.1, 1)';
            
            // Geser ke angka paling bawah (30 angka * 100px)
            pStrip.style.transform = 'translateY(-3000px)';
            hStrip.style.transform = 'translateY(-3000px)';
        }, 50);

        // Tunggu animasi selesai (3 detik)
        setTimeout(() => {
            kalkulasi(bet, pNum, hNum);
            spinBtn.disabled = false;
        }, 3100);
    }

    function kalkulasi(bet, p, h) {
        if (p === h) {
            msg.innerHTML = "DRAW! <span style='color:#ff4444'>HOST WIN.</span>";
        } else if (p === 0) {
            const win = bet * 3;
            points += win;
            msg.innerHTML = "JACKPOT KING 0! <span style='color:#ffd700'>+" + win + "</span>";
        } else if (h === 0) {
            msg.innerHTML = "LOSE! <span style='color:#ff4444'>HOST IS KING 0.</span>";
        } else if (p > h) {
            const win = bet * 2;
            points += win;
            msg.innerHTML = "WIN! <span style='color:#00ff88'>+" + win + "</span>";
        } else {
            msg.innerHTML = "LOSE! <span style='color:#ff4444'>HOST HIGHER.</span>";
        }
        updateUI();
    }

    function updateUI() {
        document.getElementById("balance").innerText = points;
        localStorage.setItem("saldo_reel", points);
    }
</script>

</body>
</html>
