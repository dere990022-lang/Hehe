<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mahjong Ways: The Real Script</title>
    <style>
        body { background: #000; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; color: white; font-family: 'Arial', sans-serif; }
        #game-container { position: relative; border: 4px solid #333; border-radius: 15px; overflow: hidden; background: #0d2b1a; }
        canvas { display: block; }
        .ui-top { position: absolute; top: 0; width: 100%; background: rgba(0,0,0,0.7); display: flex; justify-content: space-around; padding: 10px 0; border-bottom: 2px solid #ffd700; }
        .multiplier-bar { position: absolute; top: 60px; width: 100%; display: flex; justify-content: center; gap: 10px; }
        .mult { padding: 5px 15px; background: #222; border: 1px solid #444; border-radius: 5px; font-weight: bold; font-size: 14px; transition: 0.3s; }
        .mult.active { background: #ffd700; color: #000; box-shadow: 0 0 15px #ffd700; transform: scale(1.2); }
        .controls { margin-top: 15px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        #spin-btn { width: 70px; height: 70px; border-radius: 50%; border: 4px solid #ffd700; background: radial-gradient(#222, #000); color: #ffd700; font-weight: bold; cursor: pointer; font-size: 14px; }
        #spin-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .stat { text-align: center; }
        .stat-val { color: #00ff88; font-weight: bold; display: block; font-size: 18px; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="ui-top">
        <div class="stat">SALDO <span id="balance" class="stat-val">1000</span></div>
        <div class="stat">MENANG <span id="win" class="stat-val">0</span></div>
    </div>
    
    <div class="multiplier-bar">
        <div id="m1" class="mult active">x1</div>
        <div id="m2" class="mult">x2</div>
        <div id="m3" class="mult">x3</div>
        <div id="m5" class="mult">x5</div>
    </div>

    <canvas id="canvas"></canvas>
</div>

<div class="controls">
    <button id="spin-btn" onclick="startSpin()">SPIN</button>
    <div style="font-size: 12px; color: #888;">BET: 10</div>
</div>

<script>
/** * SCRIPT MAHJONG WAYS V2 - CASCADING ENGINE 
 */
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const balanceEl = document.getElementById('balance');
const winEl = document.getElementById('win');

const COLS = 5;
const ROWS = 4;
const TILE_W = 70;
const TILE_H = 90;
const GAP = 5;

canvas.width = (TILE_W + GAP) * COLS + GAP;
canvas.height = (TILE_H + GAP) * ROWS + GAP + 100; // Extra space for top/bottom

const SYMBOLS = [
    { name: 'Fa', color: '#b71c1c', txt: '發' },
    { name: 'Zhong', color: '#1b5e20', txt: '中' },
    { name: 'Bai', color: '#0d47a1', txt: '白' },
    { name: '9Dot', color: '#e65100', txt: '九' },
    { name: '5Bam', color: '#33691e', txt: '五' }
];

let balance = 1000;
let currentMultiplier = 1;
let isAnimating = false;
let grid = [];

class Tile {
    constructor(col, row, symbol) {
        this.col = col;
        this.row = row;
        this.symbol = symbol;
        this.x = GAP + col * (TILE_W + GAP);
        this.y = -200; // Start from above for cascading
        this.targetY = 120 + row * (TILE_H + GAP);
        this.isDestroyed = false;
        this.speed = 15;
    }

    update() {
        if (this.y < this.targetY) {
            this.y += this.speed;
            if (this.y > this.targetY) this.y = this.targetY;
            return true;
        }
        return false;
    }

    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        
        // Body Tile
        ctx.fillStyle = '#f5f5f5';
        ctx.beginPath();
        ctx.roundRect(0, 0, TILE_W, TILE_H, 5);
        ctx.fill();
        
        // Green Border
        ctx.strokeStyle = '#2e7d32';
        ctx.lineWidth = 2;
        ctx.strokeRect(4, 4, TILE_W - 8, TILE_H - 8);

        // Text Symbol (Bukan Emoji)
        ctx.fillStyle = this.symbol.color;
        ctx.font = 'bold 30px serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(this.symbol.txt, TILE_W/2, TILE_H/2);
        
        ctx.restore();
    }
}

function initGrid() {
    grid = [];
    for (let c = 0; c < COLS; c++) {
        for (let r = 0; r < ROWS; r++) {
            grid.push(new Tile(c, r, SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)]));
        }
    }
}

function updateMultipliers() {
    [1, 2, 3, 5].forEach(m => {
        document.getElementById('m' + m).className = (m === currentMultiplier) ? 'mult active' : 'mult';
    });
}

async function startSpin() {
    if (isAnimating || balance < 10) return;
    
    balance -= 10;
    currentMultiplier = 1;
    balanceEl.innerText = balance;
    winEl.innerText = '0';
    updateMultipliers();
    
    isAnimating = true;
    document.getElementById('spin-btn').disabled = true;
    
    initGrid();
    requestAnimationFrame(gameLoop);
}

function gameLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let moving = false;
    
    grid.forEach(tile => {
        if (tile.update()) moving = true;
        tile.draw();
    });

    if (moving) {
        requestAnimationFrame(gameLoop);
    } else {
        checkWins();
    }
}

function checkWins() {
    // Logika Ways Sederhana: Minimal 3 di kolom berurutan
    let winOccurred = false;
    let winAmount = 0;
    
    // Check Fa (Simbol paling tinggi)
    const matches = [];
    for(let c=0; c<COLS; c++) {
        const colMatches = grid.filter(t => t.col === c && t.symbol.name === 'Fa' && !t.isDestroyed);
        if(colMatches.length > 0) matches.push(colMatches);
        else break;
    }

    if(matches.length >= 3) {
        winOccurred = true;
        matches.forEach(colArr => {
            colArr.forEach(t => t.isDestroyed = true);
        });
        winAmount = matches.length * 10 * currentMultiplier;
    }

    if(winOccurred) {
        balance += winAmount;
        winEl.innerText = winAmount;
        balanceEl.innerText = balance;
        
        // Hapus yang menang & Cascading
        setTimeout(() => {
            grid = grid.filter(t => !t.isDestroyed);
            
            // Re-order rows (Ubin atas jatuh ke bawah)
            for(let c=0; c<COLS; c++) {
                let tilesInCol = grid.filter(t => t.col === c).sort((a,b) => b.row - a.row);
                tilesInCol.forEach((t, i) => {
                    t.row = ROWS - 1 - i;
                    t.targetY = 120 + t.row * (TILE_H + GAP);
                });
                
                // Isi kekosongan dari atas
                while(tilesInCol.length < ROWS) {
                    let newRow = ROWS - 1 - tilesInCol.length;
                    let newTile = new Tile(c, newRow, SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)]);
                    grid.push(newTile);
                    tilesInCol.push(newTile);
                }
            }
            
            // Naikkan multiplier
            if(currentMultiplier === 1) currentMultiplier = 2;
            else if(currentMultiplier === 2) currentMultiplier = 3;
            else currentMultiplier = 5;
            
            updateMultipliers();
            requestAnimationFrame(gameLoop);
        }, 500);
    } else {
        isAnimating = false;
        document.getElementById('spin-btn').disabled = false;
    }
}

initGrid();
drawInit();

function drawInit() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    grid.forEach(t => {
        t.y = t.targetY;
        t.draw();
    });
}
</script>

</body>
</html>
