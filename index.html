<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mahjong Ways Ultra - Pro Edition</title>
    <style>
        :root { --gold: #ffd700; --red: #ff3333; --bg: #0a0a0a; }
        body { background: var(--bg); color: white; margin: 0; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; }
        
        .header { width: 100%; padding: 15px; text-align: center; background: linear-gradient(to bottom, #1a1a1a, #0a0a0a); border-bottom: 2px solid #333; }
        .balance-box { font-size: 20px; font-weight: bold; color: var(--gold); text-shadow: 0 0 10px rgba(255,215,0,0.3); }

        /* Canvas Game */
        #gameCanvas { background: #0d2b1a; border: 4px solid #222; border-radius: 12px; box-shadow: 0 0 30px rgba(0,0,0,0.8); margin: 15px 0; max-width: 95%; height: auto; }

        .controls { width: 90%; max-width: 400px; display: flex; flex-direction: column; gap: 10px; align-items: center; }
        .bet-info { font-size: 14px; color: #888; text-transform: uppercase; letter-spacing: 1px; }

        #spinBtn { width: 80px; height: 80px; border-radius: 50%; border: none; background: radial-gradient(#fff, var(--gold), #b8860b); font-weight: 900; font-size: 16px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.5); color: #000; transition: 0.1s; }
        #spinBtn:active { transform: scale(0.9) translateY(4px); }
        #spinBtn:disabled { filter: grayscale(1); opacity: 0.5; }

        .status-msg { height: 20px; color: #00ff88; font-weight: bold; font-size: 16px; margin-top: 5px; }
    </style>
</head>
<body>

<div class="header">
    <div class="balance-box">CREDITS: <span id="balanceDisplay">1000</span></div>
</div>

<canvas id="gameCanvas" width="500" height="600"></canvas>

<div class="controls">
    <div class="bet-info">BET: 10 | WAYS TO WIN</div>
    <button id="spinBtn">SPIN</button>
    <div id="status" class="status-msg"></div>
</div>

<script>
/**
 * MAHJONG WAYS ULTRA ENGINE
 * Tanpa Emoji - Menggunakan Canvas Drawing
 */

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const balanceEl = document.getElementById('balanceDisplay');
const spinBtn = document.getElementById('spinBtn');
const statusEl = document.getElementById('status');

let balance = 1000;
const ROWS = 4;
const COLS = 5;
const TILE_W = 90;
const TILE_H = 120;
const GAP = 8;
const GRID_X = (canvas.width - (COLS * (TILE_W + GAP))) / 2;
const GRID_Y = 50;

// Daftar Simbol Mahjong (Custom Drawing)
const SYMBOLS = [
    { id: 'GREEN', color: '#1b5e20', text: '中' },
    { id: 'RED', color: '#b71c1c', text: '發' },
    { id: 'WHITE', color: '#0d47a1', text: '白' },
    { id: 'CIRCLE', color: '#e65100', text: '●' },
    { id: 'BAMBOO', color: '#33691e', text: '||' },
    { id: 'WIND', color: '#4a148c', text: '北' }
];

let grid = [];
let isSpinning = false;
let offset = 0; // Untuk animasi putar

// Inisialisasi awal
function init() {
    for (let c = 0; c < COLS; c++) {
        grid[c] = [];
        for (let r = 0; r < ROWS; r++) {
            grid[c][r] = SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)];
        }
    }
    draw();
}

function drawTile(x, y, symbol, isBlur = false) {
    // Body Kartu Mahjong
    ctx.save();
    if(isBlur) ctx.filter = 'blur(4px)';
    
    // Background putih kartu
    ctx.fillStyle = '#f5f5f5';
    ctx.beginPath();
    ctx.roundRect(x, y, TILE_W, TILE_H, 8);
    ctx.fill();
    
    // Efek 3D / Bayangan bawah kartu
    ctx.fillStyle = '#ccc';
    ctx.fillRect(x + 2, y + TILE_H - 10, TILE_W - 4, 6);

    // Border hijau khas Mahjong
    ctx.strokeStyle = '#2e7d32';
    ctx.lineWidth = 2;
    ctx.strokeRect(x + 4, y + 4, TILE_W - 8, TILE_H - 8);

    // Gambar Simbol/Text
    ctx.fillStyle = symbol.color;
    ctx.font = 'bold 40px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(symbol.text, x + TILE_W/2, y + TILE_H/2);
    
    ctx.restore();
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    for (let c = 0; c < COLS; c++) {
        for (let r = 0; r < ROWS; r++) {
            const x = GRID_X + c * (TILE_W + GAP);
            const y = GRID_Y + r * (TILE_H + GAP);
            drawTile(x, y, grid[c][r]);
        }
    }
}

async function spin() {
    if (isSpinning || balance < 10) return;
    
    isSpinning = true;
    balance -= 10;
    balanceEl.innerText = balance;
    spinBtn.disabled = true;
    statusEl.innerText = "";

    const startTime = Date.now();
    const duration = 2000; // 2 detik putaran

    function animate() {
        const now = Date.now();
        const elapsed = now - startTime;
        
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        for (let c = 0; c < COLS; c++) {
            for (let r = 0; r < ROWS; r++) {
                const x = GRID_X + c * (TILE_W + GAP);
                // Efek visual putar
                let y = GRID_Y + r * (TILE_H + GAP) + (elapsed * (c + 1) * 0.5) % 400;
                
                // Simbol dummy saat berputar
                const dummySym = SYMBOLS[Math.floor((elapsed + r + c) % SYMBOLS.length)];
                drawTile(x, y > 500 ? y - 500 : y, dummySym, true);
            }
        }

        if (elapsed < duration) {
            requestAnimationFrame(animate);
        } else {
            finalizeSpin();
        }
    }
    animate();
}

function finalizeSpin() {
    // Generate hasil akhir
    for (let c = 0; c < COLS; c++) {
        for (let r = 0; r < ROWS; r++) {
            grid[c][r] = SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)];
        }
    }
    
    draw();
    checkWins();
    isSpinning = false;
    spinBtn.disabled = false;
}

function checkWins() {
    let totalWin = 0;
    // Logika Ways: Minimal 3 simbol sama di kolom 1, 2, 3
    const firstCol = grid[0];
    
    firstCol.forEach(sym => {
        let matchCount = 1;
        let ways = 1;
        
        for(let c = 1; c < COLS; c++) {
            const colMatches = grid[c].filter(s => s.id === sym.id).length;
            if(colMatches > 0) {
                matchCount++;
                ways *= colMatches;
            } else {
                break;
            }
        }
        
        if(matchCount >= 3) {
            totalWin += (matchCount * ways * 5);
        }
    });

    if(totalWin > 0) {
        balance += totalWin;
        balanceEl.innerText = balance;
        statusEl.innerText = "BIG WIN: " + totalWin;
        // Efek Flash
        canvas.style.borderColor = "#ffd700";
        setTimeout(() => canvas.style.borderColor = "#222", 500);
    }
}

spinBtn.addEventListener('click', spin);
init();
</script>

</body>
</html>
