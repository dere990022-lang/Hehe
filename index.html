<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mahjong Ways Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-wrapper">
        <div class="header">
            <div class="logo">MAHJONG <span>WAYS II</span></div>

            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
