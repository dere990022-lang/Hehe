<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mahjong Ways - Engine Pro</title>
    <style>
        :root { --gold: #ffd700; --red: #ff3e3e; --bg: #0a0a0a; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: var(--bg); color: white; display: flex; justify-content: center; height: 100vh; overflow: hidden; }

        .game-container { width: 100%; max-width: 450px; background: #151515; display: flex; flex-direction: column; position: relative; }

        /* MULTIPLIER BAR */
        .multiplier-bar {
            display: flex; justify-content: space-around; background: #000; padding: 10px;
            border-bottom: 2px solid #333;
        }
        .mult { padding: 5px 15px; border-radius: 5px; font-weight: bold; color: #555; transition: 0.3s; }
        .mult.active { color: var(--gold); background: #332b00; box-shadow: 0 0 10px var(--gold); transform: scale(1.1); }

        .header { padding: 10px; display: flex; justify-content: space-between; align-items: center; }
        .balance { color: var(--gold); font-size: 18px; font-weight: bold; }

        /* GRID SYSTEM */
        .slot-wrapper { padding: 5px; background: #4a0000; margin: 5px; border-radius: 10px; flex-grow: 1; position: relative; overflow: hidden; }
        .grid {
            display: grid; grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(4, 1fr); gap: 4px; height: 100%;
        }

        .tile {
            background: #fff; border-radius: 5px; display: flex; justify-content: center;
            align-items: center; font-size: 30px; color: #000; position: relative;
            box-shadow: inset 0 -4px 0 #ccc; transition: all 0.3s ease-in;
        }
        .tile.gold { border: 3px solid var(--gold); background: #fffde7; }
        .tile.wild { background: linear-gradient(135deg, #ff0000, #990000); color: white; font-size: 20px; font-weight: bold; }
        .tile.winning { filter: brightness(1.5); transform: scale(0.9); border: 2px solid white; }

        /* CONTROLS */
        .footer { padding: 20px; background: #111; display: flex; justify-content: space-between; align-items: center; }
        #spin-btn {
            width: 80px; height: 80px; border-radius: 50%; border: none;
            background: radial-gradient(#fff, #ffd700); font-weight: bold; font-size: 18px;
            cursor: pointer; box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }
        #spin-btn:disabled { background: #444; color: #888; box-shadow: none; }

        #win-display { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 40px; font-weight: 900; color: var(--gold); text-shadow: 0 0 20px black;
            pointer-events: none; display: none; z-index: 100; text-align: center; }
    </style>
</head>
<body>

<div class="game-container">
    <div class="multiplier-bar">
        <div id="m1" class="mult active">x1</div>
        <div id="m2" class="mult">x2</div>
        <div id="m3" class="mult">x3</div>
        <div id="m5" class="mult">x5</div>
    </div>

    <div class="header">
        <div class="title">MAHJONG <span style="color:red">WAYS</span></div>
        <div class="balance">💰 <span id="balance-val">10000</span></div>
    </div>

    <div class="slot-wrapper">
        <div id="grid" class="grid"></div>
    </div>

    <div id="win-display">BIG WIN!</div>

    <div class="footer">
        <div>
            <div style="font-size: 10px; color: #888;">TARUHAN</div>
            <div style="font-weight: bold; color: white;">200</div>
        </div>
        <button id="spin-btn" onclick="handleSpin()">SPIN</button>
        <div style="text-align: right;">
            <div style="font-size: 10px; color: #888;">MENANG</div>
            <div id="last-win" style="font-weight: bold; color: var(--gold);">0</div>
        </div>
    </div>
</div>

<script>
    const symbols = ['🀄', '🀅', '🀆', '🀐', '🀙', '🀛', '🀃'];
    let balance = 10000;
    let multiplierIdx = 0;
    const multipliers = [1, 2, 3, 5];
    let isPlaying = false;
    let gridData = []; // 4 rows x 5 columns

    const gridEl = document.getElementById('grid');
    const spinBtn = document.getElementById('spin-btn');

    // Inisialisasi
    function init() {
        gridData = Array(4).fill().map(() => Array(5).fill(null));
        fillGrid();
        renderGrid();
    }

    function fillGrid() {
        for(let r=0; r<4; r++) {
            for(let c=0; c<5; c++) {
                if(!gridData[r][c]) {
                    gridData[r][c] = {
                        s: symbols[Math.floor(Math.random() * symbols.length)],
                        gold: Math.random() > 0.85,
                        wild: false
                    };
                }
            }
        }
    }

    function renderGrid() {
        gridEl.innerHTML = '';
        for(let r=0; r<4; r++) {
            for(let c=0; c<5; c++) {
                const cell = gridData[r][c];
                const div = document.createElement('div');
                div.className = `tile ${cell.gold ? 'gold' : ''} ${cell.wild ? 'wild' : ''}`;
                div.innerText = cell.wild ? 'WILD' : cell.s;
                gridEl.appendChild(div);
            }
        }
    }

    async function handleSpin() {
        if(isPlaying || balance < 200) return;
        isPlaying = true;
        spinBtn.disabled = true;
        balance -= 200;
        multiplierIdx = 0;
        updateUI();

        // 1. Kosongkan & Isi Baru
        gridData = Array(4).fill().map(() => Array(5).fill(null));
        fillGrid();
        renderGrid();

        // 2. Loop Cascading
        await processCascades();

        isPlaying = false;
        spinBtn.disabled = false;
    }

    async function processCascades() {
        updateMultiplierUI();
        const wins = findWins();

        if(wins.length > 0) {
            // Animasi Menang
            highlightWins(wins);
            await sleep(600);

            // Hitung Poin
            const winAmount = wins.length * 50 * multipliers[multiplierIdx];
            balance += winAmount;
            document.getElementById('last-win').innerText = winAmount;
            
            // Logika Gold ke Wild & Hapus yang menang
            handlePecah(wins);
            renderGrid();
            await sleep(300);

            // Jatuhkan simbol
            applyGravity();
            renderGrid();
            await sleep(300);

            // Isi yang kosong
            fillGrid();
            renderGrid();
            await sleep(300);

            // Naikkan Multiplier & Cek lagi
            if(multiplierIdx < 3) multiplierIdx++;
            updateUI();
            await processCascades();
        } else {
            multiplierIdx = 0;
            updateMultiplierUI();
        }
    }

    function findWins() {
        let winningCoords = [];
        // Cek simbol dari kolom kiri
        for(let r=0; r<4; r++) {
            let symbolToMatch = gridData[r][0].s;
            let currentPath = [{r, c:0}];

            for(let c=1; c<5; c++) {
                let matchesInCol = [];
                for(let r2=0; r2<4; r2++) {
                    if(gridData[r2][c].s === symbolToMatch || gridData[r2][c].wild) {
                        matchesInCol.push({r: r2, c});
                    }
                }
                if(matchesInCol.length > 0) {
                    currentPath.push(...matchesInCol);
                } else {
                    break;
                }
            }

            // Minimal 3 kolom berurutan
            const cols = new Set(currentPath.map(p => p.c));
            if(cols.size >= 3) {
                winningCoords.push(...currentPath);
            }
        }
        return winningCoords;
    }

    function highlightWins(coords) {
        const tiles = document.querySelectorAll('.tile');
        coords.forEach(pos => {
            const index = pos.r * 5 + pos.c;
            tiles[index].classList.add('winning');
        });
    }

    function handlePecah(wins) {
        wins.forEach(pos => {
            const cell = gridData[pos.r][pos.c];
            if(cell.gold) {
                gridData[pos.r][pos.c] = { s: 'WILD', gold: false, wild: true };
            } else {
                gridData[pos.r][pos.c] = null;
            }
        });
    }

    function applyGravity() {
        for(let c=0; c<5; c++) {
            let emptyRows = [];
            for(let r=3; r>=0; r--) {
                if(gridData[r][c] === null) {
                    emptyRows.push(r);
                } else if(emptyRows.length > 0) {
                    let lowestEmpty = emptyRows.shift();
                    gridData[lowestEmpty][c] = gridData[r][c];
                    gridData[r][c] = null;
                    emptyRows.push(r);
                }
            }
        }
    }

    function updateMultiplierUI() {
        document.querySelectorAll('.mult').forEach((m, i) => {
            m.classList.toggle('active', i === multiplierIdx);
        });
    }

    function updateUI() {
        document.getElementById('balance-val').innerText = balance;
        localStorage.setItem('mahjong_balance', balance);
    }

    function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

    init();
</script>
</body>
</html>
