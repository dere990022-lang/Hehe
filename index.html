<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROULETTE ROYALE GACOR</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { 
            background: #0f172a; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            min-height: 100vh; color: white; overflow-x: hidden;
        }

        .container {
            background: #1e293b;
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 20px rgba(59, 130, 246, 0.2);
            text-align: center;
            width: 95%;
            max-width: 450px;
            border: 1px solid #334155;
        }

        h1 { font-size: 28px; margin-bottom: 5px; color: #f8fafc; letter-spacing: 1px; }
        .balance-text { font-size: 18px; color: #94a3b8; margin-bottom: 20px; }
        #balance { color: #fbbf24; font-weight: bold; text-shadow: 0 0 10px rgba(251, 191, 36, 0.3); }

        /* ROULETTE WHEEL AREA */
        .wheel-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 0 auto 30px;
        }

        #wheel-canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(0,0,0,0.8), inset 0 0 10px rgba(255,255,255,0.1);
            border: 8px solid #334155;
        }

        /* Jarum Penunjuk */
        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 40px;
            background: #fbbf24;
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 10;
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.5));
        }

        /* INPUT AREA */
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input, select {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: 2px solid #334155;
            background: #0f172a;
            color: white;
            font-size: 16px;
            outline: none;
            transition: 0.2s;
        }

        input:focus { border-color: #3b82f6; }

        button {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4);
            transition: 0.2s;
        }

        button:active { transform: scale(0.97); }
        button:disabled { background: #475569; cursor: not-allowed; box-shadow: none; }

        .result-msg {
            margin-top: 20px;
            height: 24px;
            font-size: 16px;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Roulette Royale</h1>
    <p class="balance-text">Saldo Anda: <span id="balance">1000</span></p>

    <div class="wheel-container">
        <div class="pointer"></div>
        <canvas id="wheel-canvas" width="600" height="600"></canvas>
    </div>

    <div class="input-group">
        <input type="number" id="bet-amount" placeholder="Taruhan" min="1" value="10">
        <select id="bet-type">
            <option value="red">Merah (x2)</option>
            <option value="black">Hitam (x2)</option>
            <option value="green">Hijau (x14)</option>
        </select>
    </div>

    <button id="spin-btn">PUTAR SEKARANG!</button>
    <div id="result" class="result-msg"></div>
</div>

<script>
    const canvas = document.getElementById('wheel-canvas');
    const ctx = canvas.getContext('2d');
    const spinBtn = document.getElementById('spin-btn');
    const balanceDisplay = document.getElementById('balance');
    const resultDisplay = document.getElementById('result');

    let balance = 1000;
    let currentAngle = 0;
    let isSpinning = false;

    // Settingan Roda (Total 37 slot: 0-36)
    // 0 = Green, Ganjil = Red, Genap = Black (Standard European)
    const sectors = [
        { label: "0", color: "#10b981" }, // Hijau
        { label: "32", color: "#ef4444" }, { label: "15", color: "#1e293b" },
        { label: "19", color: "#ef4444" }, { label: "4", color: "#1e293b" },
        { label: "21", color: "#ef4444" }, { label: "2", color: "#1e293b" },
        { label: "25", color: "#ef4444" }, { label: "17", color: "#1e293b" },
        { label: "34", color: "#ef4444" }, { label: "6", color: "#1e293b" },
        { label: "27", color: "#ef4444" }, { label: "13", color: "#1e293b" },
        { label: "36", color: "#ef4444" }, { label: "11", color: "#1e293b" },
        { label: "30", color: "#ef4444" }, { label: "8", color: "#1e293b" },
        { label: "23", color: "#ef4444" }, { label: "10", color: "#1e293b" },
        { label: "5", color: "#ef4444" }, { label: "24", color: "#1e293b" },
        { label: "16", color: "#ef4444" }, { label: "33", color: "#1e293b" },
        { label: "1", color: "#ef4444" }, { label: "20", color: "#1e293b" },
        { label: "14", color: "#ef4444" }, { label: "31", color: "#1e293b" },
        { label: "9", color: "#ef4444" }, { label: "22", color: "#1e293b" },
        { label: "18", color: "#ef4444" }, { label: "29", color: "#1e293b" },
        { label: "7", color: "#ef4444" }, { label: "28", color: "#1e293b" },
        { label: "12", color: "#ef4444" }, { label: "35", color: "#1e293b" },
        { label: "3", color: "#ef4444" }, { label: "26", color: "#1e293b" }
    ];

    const totalSectors = sectors.length;
    const arc = Math.PI * 2 / totalSectors;

    function drawWheel() {
        const cx = canvas.width / 2;
        const cy = canvas.height / 2;
        const radius = cx - 10;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        sectors.forEach((sector, i) => {
            const angle = currentAngle + i * arc;
            
            // Draw Sector
            ctx.beginPath();
            ctx.fillStyle = sector.color;
            ctx.moveTo(cx, cy);
            ctx.arc(cx, cy, radius, angle, angle + arc);
            ctx.lineTo(cx, cy);
            ctx.fill();
            ctx.strokeStyle = "rgba(255,255,255,0.1)";
            ctx.lineWidth = 2;
            ctx.stroke();

            // Draw Text
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(angle + arc / 2);
            ctx.textAlign = "right";
            ctx.fillStyle = "white";
            ctx.font = "bold 20px sans-serif";
            ctx.fillText(sector.label, radius - 30, 10);
            ctx.restore();
        });

        // Center Cap
        ctx.beginPath();
        ctx.fillStyle = "#334155";
        ctx.arc(cx, cy, 40, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "#fbbf24";
        ctx.lineWidth = 4;
        ctx.stroke();
    }

    function rotateWheel() {
        if (!isSpinning) return;
        
        // Logika putaran: Kecepatan awal tinggi, perlahan melambat (Ease-out)
        const spinDuration = 4000;
        const startTime = performance.now();
        const startAngle = currentAngle;
        const totalRotation = Math.PI * 2 * 10 + Math.random() * Math.PI * 2; // Min 10 putaran

        function animate(currentTime) {
            const elapsed = currentTime - startTime;
            const progress = Math.min(elapsed / spinDuration, 1);
            
            // Cubic ease-out formula
            const easeOut = 1 - Math.pow(1 - progress, 3);
            
            currentAngle = startAngle + totalRotation * easeOut;
            drawWheel();

            if (progress < 1) {
                requestAnimationFrame(animate);
            } else {
                finishSpin();
            }
        }
        requestAnimationFrame(animate);
    }

    function finishSpin() {
        isSpinning = false;
        spinBtn.disabled = false;

        // Hitung hasil berdasarkan posisi jarum (Top = -PI/2)
        const normalizedAngle = (currentAngle % (Math.PI * 2));
        const index = Math.floor((totalSectors - (normalizedAngle / arc) - (totalSectors / 4)) % totalSectors + totalSectors) % totalSectors;
        const resultSector = sectors[index];
        
        const betAmount = parseInt(document.getElementById('bet-amount').value);
        const betType = document.getElementById('bet-type').value;
        
        let resultColor = "";
        if (resultSector.color === "#10b981") resultColor = "green";
        else if (resultSector.color === "#ef4444") resultColor = "red";
        else resultColor = "black";

        if (betType === resultColor) {
            let winMultiplier = resultColor === "green" ? 14 : 2;
            let winAmount = betAmount * winMultiplier;
            balance += winAmount;
            resultDisplay.innerHTML = `<span style="color: #4ade80">MENANG! Hasil: ${resultColor} (${resultSector.label}). +${winAmount}</span>`;
        } else {
            resultDisplay.innerHTML = `<span style="color: #f87171">KALAH! Hasil: ${resultColor} (${resultSector.label}).</span>`;
        }

        balanceDisplay.innerText = balance;
    }

    spinBtn.addEventListener('click', () => {
        const betAmount = parseInt(document.getElementById('bet-amount').value);
        if (isNaN(betAmount) || betAmount > balance || betAmount <= 0) {
            alert("Saldo tidak cukup atau taruhan tidak valid!");
            return;
        }

        balance -= betAmount;
        balanceDisplay.innerText = balance;
        resultDisplay.innerText = "Memutar...";
        isSpinning = true;
        spinBtn.disabled = true;
        rotateWheel();
    });

    drawWheel();
</script>

</body>
</html>
