<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MAHJONG WAYS: GACOR EDITION</title>
    <style>
        /* CSS RESET & MODERN STYLING (THE GACOR LOOK) */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Times New Roman', serif; }
        body { 
            background-color: #080808; 
            background-image: radial-gradient(#111 1px, transparent 1px);
            background-size: 20px 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; color: white; }
        
        #game-wrapper { position: relative; border: 4px solid #ffd700; border-radius: 20px; overflow: hidden; background: #001a0f; box-shadow: 0 0 50px rgba(255, 215, 0, 0.4); transition: 0.3s; }
        canvas { display: block; }

        /* UI TOP: SALDO & MULTIPLIER (PREMIUM LOOK) */
        .ui-top { position: absolute; top: 0; width: 100%; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); padding: 15px 20px; display: flex; flex-direction: column; align-items: center; }
        .stats { width: 100%; display: flex; justify-content: space-around; margin-bottom: 10px; }
        .stat-box { text-align: center; }
        .stat-label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .stat-val { font-size: 24px; font-weight: bold; color: #00ff88; text-shadow: 0 0 15px #00ff88; }

        .mult-bar { display: flex; justify-content: center; gap: 8px; margin-top: 5px; }
        .mult-btn { padding: 6px 14px; background: #222; border: 2px solid #333; border-radius: 8px; font-weight: 900; font-size: 14px; color: #aaa; transition: 0.2s; cursor: pointer; }
        .mult-btn.active { background: radial-gradient(#fff, #ffd700, #b8860b); color: #000; border: none; box-shadow: 0 0 20px #ffd700; transform: scale(1.15); }

        /* UI BOTTOM: KONTROL (THE GACOR SPIN BUTTON) */
        .controls { margin-top: 15px; display: flex; flex-direction: column; align-items: center; }
        #spin-btn { width: 90px; height: 90px; border-radius: 50%; border: 5px solid #ffd700; background: radial-gradient(#333, #000); color: #ffd700; font-weight: 900; cursor: pointer; font-size: 18px; box-shadow: 0 5px 25px rgba(255, 215, 0, 0.6); transition: 0.1s; text-transform: uppercase; text-shadow: 0 0 5px #ffd700; }
        #spin-btn:active { transform: scale(0.9) translateY(4px); box-shadow: 0 2px 10px rgba(255, 215, 0, 0.6); }
        #spin-btn:disabled { filter: grayscale(1); opacity: 0.5; cursor: not-allowed; }
        .bet-text { font-size: 14px; color: #aaa; margin-top: 10px; letter-spacing: 1px;}
        .gacor-label { color: #ffd700; font-size: 10px; font-weight: bold; text-transform: uppercase; margin-top: 5px; }

        /* HELPER: ANIMASI */
        .win-glow { animation: glowPulse 0.4s infinite alternate; }
        @keyframes glowPulse { from { filter: drop-shadow(0 0 10px #ffd700); } to { filter: drop-shadow(0 0 25px #ffd700); } }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div class="ui-top">
        <div class="stats">
            <div class="stat-box"><div class="stat-label">SALDO</div><div id="balance" class="stat-val">1000</div></div>
            <div class="stat-box"><div class="stat-label">MENANG</div><div id="win" class="stat-val">0</div></div>
        </div>
        <div class="mult-bar">
            <div id="m1" class="mult-btn active">x1</div>
            <div id="m2" class="mult-btn">x2</div>
            <div id="m3" class="mult-btn">x3</div>
            <div id="m5" class="mult-btn">x5</div>
        </div>
    </div>
    
    <canvas id="canvas"></canvas>
</div>

<div class="controls">
    <button id="spin-btn" onclick="tanding()">GACOR!</button>
    <div class="bet-text">BET: 10</div>
    <div class="gacor-label">Ultra Gacor Edition</div>
</div>

<script>
/** * MAHJONG WAYS: GACOR EDITION SCRIPT
 * Full visual overhaul for premium look & anti tumpang tindih
 */
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const balanceEl = document.getElementById('balance');
const winEl = document.getElementById('win');

const COLS = 5;
const ROWS = 4;
const TILE_W = 75; // Ukuran disesuaikan
const TILE_H = 100;
const GAP = 8;
const UI_TOP_H = 140; // Ruang buat header

canvas.width = (TILE_W + GAP) * COLS + GAP;
canvas.height = (TILE_H + GAP) * ROWS + GAP + UI_TOP_H;

// Simbol Mandarin asli dengan warna premium
const SYMBOLS = [
    { name: 'Fa', color: '#b71c1c', txt: '發' }, 
    { name: 'Zhong', color: '#1b5e20', txt: '中' },
    { name: 'Bai', color: '#0d47a1', txt: '白' },
    { name: '9Dot', color: '#e65100', txt: '九' },
    { name: '5Bam', color: '#33691e', txt: '五' },
    { name: 'WIND', color: '#4a148c', txt: '北' },
    { name: '8Dot', color: '#ffcc00', txt: '八'}
];

let balance = 1000;
let curMult = 1;
let animating = false;
let matrix = []; // Grid Matrix Dua Dimensi (Kunci anti tumpang tindih)

// SUARA (Placeholder - nambahin file .mp3 sendiri kalo mau)
// const soundSpin = new Audio('spin.mp3');
// const soundWin = new Audio('win.mp3');

function drawTile(x, y, symbol, isWin=false) {
    ctx.save();
    ctx.translate(x, y);

    if(isWin) ctx.filter = 'drop-shadow(0 0 15px #ffd700)';

    // 1. TILE BODY (Premium porcelain gradient)
    const grdBody = ctx.createLinearGradient(0, 0, 0, TILE_H);
    grdBody.addColorStop(0, '#ffffff'); grdBody.addColorStop(0.5, '#f0f0f0'); grdBody.addColorStop(1, '#e6e6e6');
    ctx.fillStyle = grdBody;
    ctx.beginPath();
    ctx.roundRect(0, 0, TILE_W, TILE_H, 6); ctx.fill();

    // 2. 3D SHADOW & MATERIAL (Kunci SANGAT Bagus)
    ctx.fillStyle = '#b3b3b3'; ctx.fillRect(4, TILE_H-8, TILE_W-8, 6);
    ctx.fillStyle = '#fdfdfd'; ctx.fillRect(4, 4, TILE_W-8, TILE_H-12);

    // 3. GREEN INNER BORDER (Pahatan khas Mahjong)
    ctx.strokeStyle = '#2e7d32'; ctx.lineWidth = 3; ctx.strokeRect(6, 6, TILE_W-12, TILE_H-12);

    // 4. SYMBOL TEXT (Berbasis font Mandarin - No Emoji)
    ctx.fillStyle = symbol.color;
    ctx.font = 'bold 36px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(symbol.txt, TILE_W/2, TILE_H/2);
    
    // 5. EFECT BERSINAR PADA SIMBOL (Makin Gacor)
    ctx.fillStyle = symbol.color;
    ctx.filter = 'drop-shadow(0 0 5px '+symbol.color+')';
    ctx.fillText(symbol.txt, TILE_W/2, TILE_H/2);

    ctx.restore();
}

function initMatrix() {
    matrix = [];
    for (let c = 0; c < COLS; c++) {
        matrix[c] = [];
        for (let r = 0; r < ROWS; r++) {
            matrix[c][r] = SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)];
        }
    }
}

function updateMultUI() {
    [1, 2, 3, 5].forEach(m => document.getElementById('m'+m).className = (m === curMult) ? 'mult-btn active' : 'mult-btn');
}

async function tanding() {
    if (animating || balance < 10) return;
    
    // soundSpin.play();
    balance -= 10;
    curMult = 1;
    balanceEl.innerText = balance;
    winEl.innerText = '0';
    updateMultUI();
    
    animating = true;
    document.getElementById('spin-btn').disabled = true;
    
    initMatrix();
    
    // Animasi putar (Blur sebentar)
    let spinCount = 0;
    let roll = setInterval(() => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.filter = 'blur(4px)';
        for(let c=0; c<COLS; c++) {
            for(let r=0; r<ROWS; r++) {
                const x = GAP + c * (TILE_W+GAP);
                const y = UI_TOP_H + GAP + r * (TILE_H+GAP);
                drawTile(x, y, SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)]);
            }
        }
        spinCount++;
        if(spinCount > 10) { clearInterval(roll); ctx.filter = 'none'; drawGame(); checkWins(); }
    }, 60);
}

function drawGame() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let c = 0; c < COLS; c++) {
        for (let r = 0; r < ROWS; r++) {
            if(matrix[c][r]) {
                const x = GAP + c * (TILE_W + GAP);
                const y = UI_TOP_H + GAP + r * (TILE_H + GAP);
                drawTile(x, y, matrix[c][r]);
            }
        }
    }
}

function checkWins() {
    let toDestroy = new Set();
    let curWin = 0;

    // Logika Ways: Minimal 3 di kolom berurutan
    for(let c=0; c < COLS; c++) {
        for(let r=0; r < ROWS; r++) {
            if(!matrix[c][r]) continue;
            const targetName = matrix[c][r].name;
            let matches = [`${c}-${r}`];

            // Cek ke kanan
            for(let nc = c+1; nc < COLS; nc++) {
                let foundInCol = false;
                for(let nr = 0; nr < ROWS; nr++) {
                    if(matrix[nc][nr] && matrix[nc][nr].name === targetName) {
                        matches.push(`${nc}-${nr}`);
                        foundInCol = true;
                    }
                }
                if(!foundInCol) break;
            }

            if(new Set(matches.map(m => m.split('-')[0])).size >= 3) {
                matches.forEach(m => toDestroy.add(m));
                // Hadiah Ways: Ways * Perkalian
                curWin += (3 * 20 * curMult); // Ways logic (dipermudah) * 20 pts
            }
        }
    }

    if(toDestroy.size > 0) {
        // soundWin.play();
        // Efek Menang (Gambar ulang yang menang pake Drop Shadow Emas)
        drawGame();
        toDestroy.forEach(pos => {
            const [c, r] = pos.split('-').map(Number);
            const x = GAP + c * (TILE_W + GAP);
            const y = UI_TOP_H + GAP + r * (TILE_H + GAP);
            drawTile(x, y, matrix[c][r], true);
        });

        // Update Poin & UI
        balance += curWin;
        balanceEl.innerText = balance;
        winEl.innerText = curWin;

        // CASCADING ENGINE (KUNCI ANTI TUMPANG TINDIH)
        setTimeout(() => {
            // Hapus yang menang di Matrix Dua Dimensi
            toDestroy.forEach(pos => {
                const [c, r] = pos.split('-').map(Number);
                matrix[c][r] = null;
            });

            // Ubin atas JATUH ke bawah (Re-order Matrix per kolom)
            for(let c=0; c < COLS; c++) {
                // Ambil ubin yang masih ada di kolom, urutin dari baris paling bawah
                let tilesInCol = [];
                for(let r = ROWS-1; r >= 0; r--) {
                    if(matrix[c][r]) tilesInCol.push(matrix[c][r]);
                }
                
                // Isi kembali matrix per kolom dari bawah
                for(let r = ROWS-1; r >= 0; r--) {
                    let tileIdx = ROWS - 1 - r;
                    if(tileIdx < tilesInCol.length) {
                        matrix[c][r] = tilesInCol[tileIdx];
                    } else {
                        // Slot kosong di bagian atas kolom diisi ubin baru
                        matrix[c][r] = SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)];
                    }
                }
            }

            // Naikkan Multiplier Bar
            if(curMult === 1) curMult = 2; else if(curMult === 2) curMult = 3; else curMult = 5;
            updateMultUI();

            // Gambar ulang hasil runtuhan & Cek kemenangan beruntun
            ctx.filter = 'none'; // Reset blur
            drawGame();
            checkWins(); // Kunci Cascade: Cek lagi kemenangan setelah runtuh

        }, 900);
    } else {
        // Selesai Cascade, gak ada menang lagi
        animating = false;
        document.getElementById('spin-btn').disabled = false;
        // visual feedback
        canvas.style.borderColor = "#ffd700"; 
    }
}

initMatrix();
drawGame(); // Tampilan awal Gacor
</script>

</body>
</html>
