<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adu Angka - Player vs Host</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { 
            background: #121212; color: white; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; 
        }

        .game-card {
            background: #1e1e1e; width: 90%; max-width: 400px;
            padding: 20px; border-radius: 15px; border: 2px solid #333;
            text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .balance-section {
            background: #252525; padding: 10px; border-radius: 10px;
            margin-bottom: 20px; border-bottom: 3px solid #ffd700;
        }

        .battle-field {
            display: flex; justify-content: space-around; align-items: center;
            margin: 30px 0;
        }

        .box {
            width: 100px; height: 100px; background: #333;
            border-radius: 10px; display: flex; flex-direction: column;
            justify-content: center; align-items: center; border: 1px solid #444;
        }

        .box label { font-size: 12px; color: #aaa; margin-bottom: 5px; }
        .box .number { font-size: 32px; font-weight: bold; }

        .vs { font-size: 24px; font-weight: 900; color: #ff4500; }

        .controls input {
            width: 100%; padding: 12px; margin-bottom: 10px;
            background: #252525; border: 1px solid #444; color: white;
            border-radius: 8px; text-align: center;
        }

        #play-btn {
            width: 100%; padding: 15px; background: #ffd700;
            border: none; border-radius: 8px; font-weight: bold;
            font-size: 18px; cursor: pointer; transition: 0.2s;
        }

        #play-btn:active { transform: scale(0.98); }
        
        #result-msg {
            margin-top: 20px; font-weight: bold; height: 20px;
        }

        .win { color: #00ff00; }
        .lose { color: #ff4444; }
        .draw { color: #ffff00; }
    </style>
</head>
<body>

<div class="game-card">
    <div class="balance-section">
        <small>SALDO ANDA</small>
        <div id="balance" style="font-size: 24px; font-weight: bold; color: #ffd700;">1000</div>
    </div>

    <div class="battle-field">
        <div class="box">
            <label>PLAYER</label>
            <div id="p-num" class="number">?</div>
        </div>
        <div class="vs">VS</div>
        <div class="box">
            <label>HOST</label>
            <div id="h-num" class="number">?</div>
        </div>
    </div>

    <div class="controls">
        <input type="number" id="bet" placeholder="Masukkan Taruhan" min="1">
        <button id="play-btn" onclick="tanding()">TANDINGKAN!</button>
    </div>

    <div id="result-msg"></div>
</div>

<script>
    let points = parseInt(localStorage.getItem("points_adu")) || 1000;
    document.getElementById("balance").innerText = points;

    function tanding() {
        const betInput = document.getElementById("bet");
        const betAmt = parseInt(betInput.value);
        const resMsg = document.getElementById("result-msg");
        const pNumEl = document.getElementById("p-num");
        const hNumEl = document.getElementById("h-num");

        // Validasi
        if (isNaN(betAmt) || betAmt <= 0) {
            alert("Masukkan jumlah taruhan!");
            return;
        }
        if (betAmt > points) {
            alert("Saldo tidak cukup!");
            return;
        }

        // Animasi acak sebentar
        resMsg.innerText = "Mengadu angka...";
        let count = 0;
        const interval = setInterval(() => {
            pNumEl.innerText = Math.floor(Math.random() * 10);
            hNumEl.innerText = Math.floor(Math.random() * 10);
            count++;
            if (count > 10) {
                clearInterval(interval);
                tentukanPemenang(betAmt);
            }
        }, 50);
    }

    function tentukanPemenang(bet) {
        const pNum = Math.floor(Math.random() * 10) + 1; // 1-10
        const hNum = Math.floor(Math.random() * 10) + 1; // 1-10
        const resMsg = document.getElementById("result-msg");

        document.getElementById("p-num").innerText = pNum;
        document.getElementById("h-num").innerText = hNum;

        if (pNum > hNum) {
            points += bet;
            resMsg.innerHTML = `<span class="win">MENANG! +${bet} Poin</span>`;
        } else if (hNum > pNum) {
            points -= bet;
            resMsg.innerHTML = `<span class="lose">KALAH! -${bet} Poin</span>`;
        } else {
            resMsg.innerHTML = `<span class="draw">SERI! Poin Kembali</span>`;
        }

        updatePoints();
    }

    function updatePoints() {
        document.getElementById("balance").innerText = points;
        localStorage.setItem("points_adu", points);
    }
</script>

</body>
</html>
