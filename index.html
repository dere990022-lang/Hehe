<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adu Angka - 0 is THE KING</title>
    <style>
        * { box-sizing: border-box; font-family: 'Courier New', Courier, monospace; }
        body { 
            background: #050505; color: #fff; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; 
        }

        .wrapper {
            background: #111; width: 95%; max-width: 400px;
            padding: 20px; border: 3px solid #444; border-radius: 10px;
            text-align: center; box-shadow: 0 0 20px rgba(0,255,0,0.1);
        }

        .display-saldo {
            font-size: 22px; color: #0f0; margin-bottom: 20px;
            text-shadow: 0 0 5px #0f0;
        }

        .board {
            display: flex; justify-content: space-around; align-items: center;
            background: #222; padding: 20px 10px; border-radius: 8px;
            margin-bottom: 20px; border: 1px solid #333;
        }

        .side { flex: 1; }
        .val { 
            font-size: 45px; font-weight: bold; margin: 10px 0; 
            color: #fff;
        }
        .king { color: #ffcc00; text-shadow: 0 0 10px #ffcc00; font-size: 55px; }

        input {
            width: 100%; padding: 12px; background: #000; color: #0f0;
            border: 1px solid #0f0; border-radius: 5px; margin-bottom: 10px;
            text-align: center; font-size: 18px;
        }

        button {
            width: 100%; padding: 15px; background: #0f0; color: #000;
            border: none; border-radius: 5px; font-weight: bold;
            font-size: 18px; cursor: pointer;
        }

        button:active { background: #0a0; transform: translateY(2px); }

        #msg { margin-top: 20px; font-size: 16px; font-weight: bold; min-height: 24px; }
        .x3-notif { color: #ffcc00; animation: blink 0.5s step-end infinite; }

        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="display-saldo">POIN: <span id="points">1000</span></div>

    <div class="board">
        <div class="side">
            <small>PLAYER</small>
            <div id="p-val" class="val">?</div>
        </div>
        <div style="font-size: 20px; color: #555;">VS</div>
        <div class="side">
            <small>HOST</small>
            <div id="h-val" class="val">?</div>
        </div>
    </div>

    <input type="number" id="bet-input" placeholder="JUMLAH BET">
    <button onclick="gas()">TANDINGKAN!</button>

    <div id="msg"></div>
    <p style="font-size: 11px; color: #444; margin-top: 15px;">Rule: 0 beats 1-30 (Win x3). Max: 30.</p>
</div>

<script>
    let saldo = parseInt(localStorage.getItem("saldo_king")) || 1000;
    updateUI();

    function gas() {
        const betInput = document.getElementById("bet-input");
        const bet = parseInt(betInput.value);
        const msg = document.getElementById("msg");
        const pEl = document.getElementById("p-val");
        const hEl = document.getElementById("h-val");

        if (isNaN(bet) || bet <= 0) return alert("Isi bet dulu!");
        if (bet > saldo) return alert("Poin kurang!");

        saldo -= bet;
        updateUI();
        msg.innerText = "BERADU...";
        pEl.classList.remove("king");
        hEl.classList.remove("king");

        // Animasi Rolling
        let spinCount = 0;
        let roll = setInterval(() => {
            pEl.innerText = Math.floor(Math.random() * 31);
            hEl.innerText = Math.floor(Math.random() * 31);
            spinCount++;
            if (spinCount > 12) {
                clearInterval(roll);
                finish(bet);
            }
        }, 60);
    }

    function finish(bet) {
        const pNum = Math.floor(Math.random() * 31); // 0 - 30
        const hNum = Math.floor(Math.random() * 31);
        const msg = document.getElementById("msg");
        const pEl = document.getElementById("p-val");
        const hEl = document.getElementById("h-val");

        pEl.innerText = pNum;
        hEl.innerText = hNum;

        // Visual check for King (0)
        if (pNum === 0) pEl.classList.add("king");
        if (hNum === 0) hEl.classList.add("king");

        // LOGIKA PEMENANG
        if (pNum === hNum) {
            // SERI
            saldo += bet;
            msg.innerHTML = '<span style="color:yellow">DRAW! Poin Kembali.</span>';
        } 
        else if (pNum === 0) {
            // Player dapet 0 (KING) - Otomatis Win x3
            const winAmt = bet * 3;
            saldo += winAmt;
            msg.innerHTML = `<span class="x3-notif">JACKPOT KING 0! +${winAmt}</span>`;
        } 
        else if (hNum === 0) {
            // Host dapet 0 (KING) - Player Lose
            msg.innerHTML = '<span style="color:red">LOSE! Host is THE KING.</span>';
        } 
        else if (pNum > hNum) {
            // Menang Biasa (Angka lebih besar)
            const winAmt = bet * 2;
            saldo += winAmt;
            msg.innerHTML = `<span style="color:#0f0">WIN! +${winAmt}</span>`;
        } 
        else {
            // Kalah Biasa
            msg.innerHTML = '<span style="color:red">LOSE! Angka Host lebih besar.</span>';
        }

        updateUI();
    }

    function updateUI() {
        document.getElementById("points").innerText = saldo;
        localStorage.setItem("saldo_king", saldo);
    }
</script>

</body>
</html>
